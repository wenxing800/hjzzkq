<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专致口腔</title>
    <style>
        /* 彻底清空所有边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 让图片在整个屏幕正中央 */
        html, body {
            width: 100%;
            height: 100%;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 图片自适应，保持比例，最大不超过屏幕 */
        img {
            max-width: 92vw;
            max-height: 92vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <!-- 显示 333.png 图片，居中展示 -->
    <img src="333.png" alt="专致口腔">
</body>
</html>
